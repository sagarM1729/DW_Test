name: "Silver Processing Pipeline"
tasks:
  - task_key: "Silver_Upsert_Dim_Rep"
    spark_python_task:
      python_file: "src/silver/upsert_silver_scd1.py"
      parameters: ["--table_name", "dim_rep_master"]
    cluster_key: "default_cluster"

  - task_key: "Silver_Upsert_Fact_Rx"
    spark_python_task:
      python_file: "src/silver/upsert_silver_fact.py"
      parameters: ["--table_name", "fact_xponents_rx"]
    cluster_key: "default_cluster"

  - task_key: "Silver_Upsert_Fact_Call"
    spark_python_task:
      python_file: "src/silver/upsert_silver_fact.py"
      parameters: ["--table_name", "fact_call_activity"]
    cluster_key: "default_cluster"

job_clusters:
  - job_cluster_key: "default_cluster"
    new_cluster:
      spark_version: "13.3.x-scala2.12"
      node_type_id: "i3.xlarge"
      num_workers: 2

  - task_key: "Silver_Upsert_Dim_Territory"
    spark_python_task:
      python_file: "src/silver/upsert_silver_scd2.py"
      parameters: ["--table_name", "dim_territory_alignment"]
    cluster_key: "default_cluster"
